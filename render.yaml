services:
  - type: web
    name: vpcc-vietan-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vpcc-vietan-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://naizdabezt.github.io

databases:
  - name: vpcc-vietan-db
    plan: free
