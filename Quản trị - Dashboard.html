<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VPCC Việt An — Dashboard điều hành (PH04)</title>
<link rel="stylesheet" href="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="assets/lucide-react-shim.js"></script>
<script src="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/_ds_bundle.js"></script>
<script src="src/api-client.jsx"></script>

<script type="text/babel" src="src/admin/data.jsx"></script>
<script type="text/babel" src="src/admin/charts.jsx"></script>
<script type="text/babel" src="src/admin/shell.jsx"></script>
<script type="text/babel" src="src/admin/views.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const D = window.ADMIN_DATA;
  const { AdminSidebar, AdminTopbar, FilterBar } = window.AdminShell;
  const { OverviewView, ProductivityView, FinanceView, GovernanceView, ReportsView } = window.AdminViews;
  const { Toast } = window.FSICheckinDesignSystem_019df8;

  const [authed] = useState(window.VAApi.isAuthed());
  const persons = ["Tất cả nhân sự", ...D.tknv.map((t) => t.name), ...D.ccv.map((c) => c.name)];
  const [page, setPage] = useState("overview");
  const [range, setRange] = useState("month");
  const [person, setPerson] = useState(persons[0]);
  const [type, setType] = useState("Tất cả loại hồ sơ");
  const [toast, setToast] = useState(null);

  const goPortal = () => { window.VAApi.logout(); window.location.href = "Đăng nhập.html"; };
  const exportRpt = (name, fmt) => { setToast({ title: "Đang kết xuất " + fmt, message: name + " — đã đưa vào hàng đợi tải về." }); setTimeout(() => setToast(null), 3200); };
  const showFilter = page === "overview" || page === "productivity" || page === "finance";

  useEffect(() => { if (!authed) window.location.href = "Đăng nhập.html"; }, [authed]);
  if (!authed) return null; // đang chuyển hướng sang Đăng nhập.html

  let view;
  if (page === "overview") view = <OverviewView range={range} />;
  else if (page === "productivity") view = <ProductivityView person={person} />;
  else if (page === "finance") view = <FinanceView range={range} />;
  else if (page === "governance") view = <GovernanceView />;
  else view = <ReportsView onExport={exportRpt} />;

  return (
    <div style={{ display: "flex", height: "100%", background: "var(--bg-base)" }}>
      <AdminSidebar active={page} onNav={setPage} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, minHeight: 0 }}>
        <AdminTopbar active={page} onLogout={goPortal} />
        {showFilter && <FilterBar range={range} onRange={setRange} person={person} onPerson={setPerson} type={type} onType={setType} persons={persons} onExport={exportRpt} />}
        <main style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: 20 }}>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>{view}</div>
        </main>
      </div>
      {toast && (
        <div style={{ position: "fixed", right: 24, bottom: 24, zIndex: 90 }}>
          <Toast tone="success" title={toast.title} message={toast.message} onClose={() => setToast(null)} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</svg>
</template>

</html>
