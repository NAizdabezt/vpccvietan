<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VPCC Việt An — Thu ngân (PH02)</title>
<link rel="stylesheet" href="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes vaSlideIn { from { transform: translateX(24px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes vaPop { from { transform: scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="assets/lucide-react-shim.js"></script>
<script src="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/_ds_bundle.js"></script>
<script src="src/api-client.jsx"></script>
<script type="text/babel" src="src/session-store.jsx"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/pos/data.jsx"></script>
<script type="text/babel" src="src/pos/shell.jsx"></script>
<script type="text/babel" src="src/sessions.jsx"></script>
<script type="text/babel" src="src/pos/receipt.jsx"></script>
<script type="text/babel" src="src/pos/fasttrack.jsx"></script>
<script type="text/babel" src="src/pos/queue.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "receiptStyle": "drawer",
  "accent": "#2563eb"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const nv = window.VAApi.getUser();
  const [authed] = useState(window.VAApi.isAuthed());
  const [page, setPage] = useState("overview");
  const role = "cashier";

  const { PosSidebar, PosTopbar } = window.POSShell;
  const { PosScreen } = window;
  const { OverviewScreen, CompletedScreen } = window.VASessions;
  const goPortal = () => { window.VAApi.logout(); window.location.href = "Đăng nhập.html"; };

  useEffect(() => { if (!authed) window.location.href = "Đăng nhập.html"; }, [authed]);
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", t.accent);
    r.style.setProperty("--accent-hover", t.accent === "#2563eb" ? "#1d4ed8" : t.accent === "#2E3192" ? "#252873" : "#15803d");
  }, [t.accent]);

  if (!authed) return null; // đang chuyển hướng sang Đăng nhập.html

  let content;
  if (page === "overview") content = <OverviewScreen role={role} currentUser={nv ? nv.hoTen : ""} canCreate={false} canAttach={false} canCharge={true} />;
  else if (page === "completed") content = <CompletedScreen role={role} />;
  else content = <PosScreen receiptStyle={t.receiptStyle} onGoOverview={() => setPage("overview")} />;

  return (
    <div style={{ position: "relative", display: "flex", height: "100%", background: "var(--bg-base)" }}>
      <PosSidebar active={page} onNav={setPage} role={role} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, minHeight: 0 }}>
        <PosTopbar active={page} role={role} onLogout={goPortal} nv={nv} />
        <main style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {content}
        </main>
      </div>

      <TweaksPanel>
        <TweakSection label="Phiếu thu (2 hướng)" />
        <TweakRadio label="Kiểu mở" value={t.receiptStyle}
          options={[{ value: "drawer", label: "Drawer" }, { value: "modal", label: "Modal" }]}
          onChange={(v) => setTweak("receiptStyle", v)} />
        <p style={{ margin: "2px 0 0", fontSize: 11, color: "var(--text-tertiary)", lineHeight: 1.4 }}>
          Drawer: trượt từ phải, giữ ngữ cảnh hàng chờ. Modal: nổi giữa màn, tập trung tối đa.
        </p>
        <TweakSection label="Màu nhấn" />
        <TweakColor label="Accent" value={t.accent}
          options={["#2563eb", "#2E3192", "#00A651"]}
          onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
