<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VPCC Việt An — Màn hình Soạn thảo (PH01)</title>
<link rel="stylesheet" href="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Trình soạn thảo Quill (src/editor.jsx) — khung trang A4 + toolbar khớp design system */
  .va-quill-page { max-width: 660px; margin: 0 auto; background: #fff; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); border-radius: var(--radius-md); overflow: hidden; }
  .va-quill-page .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid var(--border-subtle); background: var(--bg-elevated); font-family: var(--font-sans); }
  .va-quill-page .ql-container.ql-snow { border: none; }
  .va-quill-page .ql-editor { font-family: 'Times New Roman', Times, serif; font-size: 14.5px; line-height: 2; color: var(--text-primary); min-height: 500px; }
  .va-quill-page .ql-editor.ql-blank::before { font-style: normal; color: var(--text-tertiary); }
  .va-field { border-radius: 4px; padding: 1px 5px; transition: background .1s, box-shadow .1s; }
  .va-field[data-origin="empty"] { color: var(--text-tertiary); font-style: italic; box-shadow: inset 0 0 0 1px var(--border-strong); }
  .va-field[data-origin="auto"] { background: var(--bg-success); color: var(--text-primary); font-weight: 600; font-style: normal; box-shadow: inset 0 0 0 1px var(--border-success); }
  .va-field[data-origin="manual"] { background: var(--accent-muted); color: var(--accent-hover); font-weight: 600; font-style: normal; box-shadow: inset 0 0 0 1px var(--accent-border); }

  /* In hợp đồng thật (src/printflow.jsx#ContractPrintView) — cô lập đúng kiểu
     đã dùng cho bìa lưu trữ (src/arc/cover.jsx), áp cho #va-print-contracts. */
  @media print {
    body * { visibility: hidden !important; }
    #va-print-contracts, #va-print-contracts * { visibility: visible !important; }
    #va-print-contracts { display: block !important; position: fixed !important; inset: 0 !important; margin: 0 !important; }
    .va-print-contract-page { max-width: none !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; page-break-after: always; }
    .va-field { background: none !important; box-shadow: none !important; font-weight: inherit !important; }
    .va-field[data-origin="empty"] { text-decoration: underline; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="assets/lucide-react-shim.js"></script>
<script src="_ds/fsi-checkin-design-system-019df8fd-82d2-706c-bcbd-e163bd6586ff/_ds_bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.js"></script>
<script src="src/api-client.jsx"></script>
<script type="text/babel" src="src/session-store.jsx"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/templates-data.jsx"></script>
<script type="text/babel" src="src/editor.jsx"></script>
<script type="text/babel" src="src/template-manager.jsx"></script>
<script type="text/babel" src="src/pieces.jsx"></script>
<script type="text/babel" src="src/lookup.jsx"></script>
<script type="text/babel" src="src/printflow.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/sessions.jsx"></script>
<script type="text/babel" src="src/photoqueue.jsx"></script>
<script type="text/babel" src="src/flowA.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "sessionBar": true,
  "accent": "#2563eb"
}/*EDITMODE-END*/;

function genSessionId() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  const seq = String(Math.floor(Math.random() * 900) + 100);
  return `PGD-${d.getFullYear()}-${p(d.getMonth() + 1)}${p(d.getDate())}-${seq}`;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const nv = window.VAApi.getUser();
  const [authed] = useState(window.VAApi.isAuthed());
  const [role, setRole] = useState(nv && nv.vaiTro.includes("CCV") ? "ccv" : "tknv");
  const [page, setPage] = useState("overview");
  const [activeSession, setActiveSession] = useState(null);
  const [composeKey, setComposeKey] = useState(0);
  const [conflict, setConflict] = useState(null); // { session, lockedByName } | null
  const [conflictBusy, setConflictBusy] = useState(false);

  const { Sidebar, Topbar, SessionBar } = window.VAShell;
  const { FlowA, PhotoQueueScreen } = window;
  const { OverviewScreen, CompletedScreen, RequestsScreen, corrReqsForCcv, ConflictModal } = window.VASessions;
  const currentUser = nv ? (role === "ccv" ? "CCV " + nv.hoTen : nv.hoTen) : "";
  const goPortal = () => { window.VAApi.logout(); window.location.href = "Đăng nhập.html"; };

  useEffect(() => { if (!authed) window.location.href = "Đăng nhập.html"; }, [authed]);

  // Đếm yêu cầu hiệu chỉnh chờ duyệt định tuyến tới CCV đang đăng nhập (badge sidebar)
  const [reqTick, setReqTick] = useState(0);
  const reqCount = role === "ccv" ? corrReqsForCcv(currentUser, false).length : 0;
  useEffect(() => {
    const onStore = () => setReqTick((t) => t + 1);
    window.addEventListener("storage", onStore);
    return () => window.removeEventListener("storage", onStore);
  }, []);
  // Tab "Yêu cầu hiệu chỉnh" chỉ dành cho CCV — đổi vai trò thì rời tab
  useEffect(() => { if (page === "requests" && role !== "ccv") setPage("overview"); }, [role, page]);

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", t.accent);
    r.style.setProperty("--accent-hover", t.accent === "#2563eb" ? "#1d4ed8" : t.accent === "#2E3192" ? "#252873" : "#15803d");
  }, [t.accent]);

  if (!authed) return null; // đang chuyển hướng sang Đăng nhập.html (xem useEffect ở trên)

  const startNew = () => {
    const now = new Date();
    const p = (n) => String(n).padStart(2, "0");
    setActiveSession({ id: genSessionId(), customer: "", isNew: true, createdAt: `${p(now.getDate())}/${p(now.getMonth() + 1)}/${now.getFullYear()} · ${p(now.getHours())}:${p(now.getMinutes())}` });
    setComposeKey((k) => k + 1);
    setPage("compose");
  };
  const enterCompose = (s) => { setActiveSession(s); setComposeKey((k) => k + 1); setPage("compose"); };
  const openSession = async (s) => {
    // Ghi nhận khóa phiên khi truy cập để chỉnh sửa/soạn thảo — khóa thật ở server (không còn localStorage giả)
    if (!["draft", "drafting", "waitNumberPay"].includes(s.status) || !s.hoSoId) { enterCompose(s); return; }
    try {
      await window.VAApi.hoSo.khoaSoanThao(s.hoSoId);
      enterCompose(s);
    } catch (e) {
      if (e.status === 409 && e.data && e.data.dangSoanBoi) {
        setConflict({ session: s, lockedByName: e.data.dangSoanBoi.hoTen });
      } else {
        enterCompose(s); // lỗi khác (mạng...) — không chặn thao tác, cho mở như cũ
      }
    }
  };
  const confirmTakeover = async () => {
    if (!conflict) return;
    setConflictBusy(true);
    try {
      await window.VAApi.hoSo.khoaSoanThao(conflict.session.hoSoId, true);
      const s = conflict.session;
      setConflict(null);
      enterCompose(s);
    } catch (e) {
      setConflict(null);
    } finally {
      setConflictBusy(false);
    }
  };
  const cancelConflict = () => setConflict(null);
  const exitCompose = () => {
    if (activeSession && activeSession.hoSoId) window.VAApi.hoSo.moKhoaSoanThao(activeSession.hoSoId).catch(() => {});
    setPage("overview");
  };

  // Điều hướng từ thông báo (#hoSo=...&hanhDong=xem) — nhảy thẳng vào soạn thảo đúng hồ sơ.
  // Dùng URL hash (không phải query string) vì trình chủ tĩnh cục bộ redirect
  // "*.html?..." và làm mất query string; hash luôn được trình duyệt giữ nguyên.
  useEffect(() => {
    const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const hoSoId = params.get("hoSo");
    if (!hoSoId || params.get("hanhDong") !== "xem") return;
    window.history.replaceState(null, "", window.location.pathname + window.location.search);
    window.VAApi.hoSo.get(hoSoId).then((row) => openSession(window.VAStore.fromApi(row))).catch(() => {});
  }, []);
  const onNav = (id) => {
    if (id === "compose" && !activeSession) { startNew(); return; }
    setReqTick((t) => t + 1);
    setPage(id);
  };

  const composeMode = !activeSession ? "new" : activeSession.isNew ? "new" : (activeSession.status === "waitAttach" || activeSession.status === "done") ? "view" : "edit";

  return (
    <div style={{ position: "relative", display: "flex", height: "100%", background: "var(--bg-base)" }}>
      <Sidebar active={page} onNav={onNav} role={role} badges={{ requests: reqCount }} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, minHeight: 0 }}>
        <Topbar title={page === "overview" ? "Luồng tổng quan" : page === "completed" ? "Hồ sơ hoàn thành" : page === "requests" ? "Yêu cầu hiệu chỉnh" : page === "photos" ? "Hàng chờ ảnh" : page === "templates" ? "Biểu mẫu soạn thảo" : "Soạn thảo hồ sơ"} role={role} onRole={setRole} onLogout={goPortal} nv={nv} />
        {page === "compose" && t.sessionBar && <SessionBar session={activeSession} />}
        <main style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {page === "overview"
            ? <OverviewScreen role={role} currentUser={currentUser} canCreate={true} canAttach={false} canCapture={role === "ccv"} onNew={startNew} onOpen={openSession} />
            : page === "completed"
              ? <CompletedScreen role={role} />
              : page === "requests"
                ? <RequestsScreen currentUser={currentUser} isCoverage={false} />
                : page === "photos"
                  ? <PhotoQueueScreen role={role} />
                  : page === "templates"
                    ? <window.VATemplateManager currentUser={currentUser} />
                    : <FlowA key={composeKey} mode={composeMode} density={t.density} role={role} currentNv={nv} session={activeSession || { id: genSessionId() }} onExit={exitCompose} onStatus={() => {}} onMeta={(m) => setActiveSession((s) => s ? { ...s, ...m } : s)} />}
        </main>
      </div>

      <TweaksPanel>
        <TweakSection label="Hiển thị" />
        <TweakRadio label="Mật độ" value={t.density}
          options={[{ value: "comfy", label: "Thoáng" }, { value: "compact", label: "Dày" }]}
          onChange={(v) => setTweak("density", v)} />
        <TweakToggle label="Dải phiên giao dịch" value={t.sessionBar} onChange={(v) => setTweak("sessionBar", v)} />
        <TweakSection label="Màu nhấn" />
        <TweakColor label="Accent" value={t.accent}
          options={["#2563eb", "#2E3192", "#00A651"]}
          onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>

      {conflict && (
        <ConflictModal
          lockedByName={conflict.lockedByName}
          busy={conflictBusy}
          onCancel={cancelConflict}
          onConfirm={confirmTakeover}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  <rect x="36" y="34" width="28" height="3" rx="1.5" fill="#2563eb"/>
  <rect x="36" y="42" width="22" height="2.5" rx="1.25" fill="#d9d9d6"/>
  <rect x="36" y="48" width="26" height="2.5" rx="1.25" fill="#d9d9d6"/>
  <rect x="36" y="54" width="18" height="2.5" rx="1.25" fill="#d9d9d6"/>
  <circle cx="66" cy="66" r="9" fill="#2563eb"/>
  <path d="M62 66l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

</template>
</body>
</html>
