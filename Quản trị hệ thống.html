<script>
  // Deploy thật (GitHub Pages) không tự có backend — trỏ thẳng về backend đã
  // host công khai (Render). Khi chạy local (serve/localhost) giữ nguyên mặc
  // định http://localhost:4000 trong src/api-client.jsx, không đổi gì cả.
  if (location.hostname.endsWith("github.io")) {
    window.VA_API_BASE = "https://vpcc-vietan-backend.onrender.com";
  }
</script>
<script src="src/api-client.jsx"></script>
<script type="text/babel" src="src/sessions.jsx"></script>

<script type="text/babel" src="src/sysadmin/data.jsx"></script>

<script type="text/babel" src="src/sysadmin/designer-canvas.jsx"></script>
<script type="text/babel" src="src/sysadmin/designer-panel.jsx"></script>
<script type="text/babel" src="src/sysadmin/shell.jsx"></script>
<script type="text/babel" src="src/sysadmin/designer.jsx"></script>
<script type="text/babel" src="src/sysadmin/governance.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const { SaSidebar, SaTopbar } = window.SaShell;
  const { FlowDesigner } = window.SaDesigner;
  const { AccountsView, PermissionsView, AuditView, WorkplacesView } = window.SaGovernance;
  const { Toast } = window.FSICheckinDesignSystem_019df8;

  const nv = window.VAApi.getUser();
  // QTHT là màn quyền cao nhất (RBAC/workflow/tài khoản) — chỉ vai trò QTHT được vào,
  // không dùng chung điều kiện "đã đăng nhập" như các màn khác.
  const authed = window.VAApi.isAuthed() && !!nv && nv.vaiTro.includes("QTHT");
  const [page, setPage] = useState("designer");
  const [toast, setToast] = useState(null);
  const [accounts, setAccounts] = useState([]);
  const [workplaces, setWorkplaces] = useState([]);

  const goPortal = () => { window.VAApi.logout(); window.location.href = "Đăng nhập.html"; };
  const fire = (title, message, tone = "success") => { setToast({ title, message, tone }); setTimeout(() => setToast(null), 3200); };

  const refreshAll = async () => {
    const [accs, wps] = await Promise.all([window.SaGovernance.fetchAccountsAdapted(), window.SaGovernance.fetchWorkplacesAdapted()]);
    setAccounts(accs); setWorkplaces(wps);
  };
  useEffect(() => { if (authed) refreshAll(); }, [authed]);
  useEffect(() => { if (!authed) window.location.href = "Đăng nhập.html"; }, [authed]);
  if (!authed) return null; // đang chuyển hướng sang Đăng nhập.html (chưa đăng nhập hoặc không phải QTHT)

  let view;
  if (page === "designer") view = <FlowDesigner onToast={fire} />;
  else if (page === "accounts") view = <AccountsView onToast={fire} accounts={accounts} setAccounts={setAccounts} workplaces={workplaces} onRefresh={refreshAll} />;
  else if (page === "workplaces") view = <WorkplacesView onToast={fire} workplaces={workplaces} setWorkplaces={setWorkplaces} accounts={accounts} onRefresh={refreshAll} />;
  else if (page === "permissions") view = <PermissionsView onToast={fire} />;
  else view = <AuditView />;

  const fullBleed = page === "designer";

  return (
    <div style={{ display: "flex", height: "100%", background: "var(--bg-base)" }}>
      <SaSidebar active={page} onNav={setPage} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, minHeight: 0 }}>
        <SaTopbar active={page} onLogout={goPortal} nv={nv} />
        <main style={{ flex: 1, minHeight: 0, overflowY: fullBleed ? "hidden" : "auto", padding: 20 }}>
          {fullBleed
            ? <div style={{ height: "100%", minHeight: 0 }}>{view}</div>
            : <div style={{ maxWidth: 1200, margin: "0 auto" }}>{view}</div>}
        </main>
      </div>
      {toast && (
        <div style={{ position: "fixed", right: 24, bottom: 24, zIndex: 90 }}>
          <Toast tone={toast.tone || "success"} title={toast.title} message={toast.message} onClose={() => setToast(null)} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
